<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Semarang Farm</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e21839">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192.png">
    <link rel="apple-touch-icon" href="icon/icon-192.png">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #f6bac4; 
        }

        /* Perbaikan khusus agar iframe di iOS tidak nge-zoom sendiri */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzGt6bJL4khqOi32wVV89CLL68VkFZjVqYEqej2CpjRnpxoZFafymJwfZrvGGvswxkI/exec"></iframe>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
