<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semarang Farm</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e21839">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" sizes="192x192" href="icon/icon-192.png">
    <link rel="apple-touch-icon" href="icon/icon-192.png">

    <style>
        /* Reset total agar tidak ada margin/padding yang memotong lebar */
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background-color: #f6bac4; 
            overflow: hidden; 
        }

        /* Container utama Iframe */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Wrapper Iframe harus bersih dari padding */
        .iframe-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            margin: 0;
            padding: 0;
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }

        /* Iframe dipaksa lebar penuh tanpa border */
        iframe { 
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            margin: 0;
            padding: 0;
        }

        /* Khusus Layar HP: Memastikan tidak ada sisa ruang di sisi kiri/kanan */
        @media only screen and (max-width: 600px) {
            .iframe-wrapper {
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="iframe-wrapper">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzGt6bJL4khqOi32wVV89CLL68VkFZjVqYEqej2CpjRnpxoZFafymJwfZrvGGvswxkI/exec" 
                allow="geolocation; microphone; camera">
            </iframe>
        </div>
    </div>

    <script>
        // Registrasi Service Worker untuk PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
</body>
</html>
